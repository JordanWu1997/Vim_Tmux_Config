#
## Update TMUX display (e.g. localhost:XX -> localhost:XX)
#function tmux_update_display
#    set LAST_DISPLAY $DISPLAY
#    set DISPLAY (tmux show-env | sed -n 's/^DISPLAY=//p')
#    echo "UPDATE_TMUX_DISPLAY: $LAST_DISPLAY (OLD) -> $DISPLAY (NEW)"
#end
#
# NOTE: Hang running process onto TMUX session w/ reptyr
# -- References
#    -- https://blog.nelhage.com/2011/02/changing-ctty/
#    -- https://forum.openeuler.org/t/topic/383
#    -- https://github.com/nelhage/reptyr/issues/62
# (1) Preparation
#    -- Install reptyr on Fedora: sudo dnf install  reptyr
#    -- To make reptyr work: echo 0 | sudo tee /proc/sys/kernel/yama/ptrace_scope
# (2) Steps
#    1. In original terminal (the one that has process running)
#       1. Press [Ctrl] + [z] to send process to background
#       2. Use jobs -l | cut -f2 | xclip -i to get process PID and copy to clipboard
#       3. Run disown <PID> to disown process
#    2. In target terminal, use reptyr <PID> to restore process in target terminal
#    3. In original terminal, close the shell where process was running on

# Disable scrollback clearing
set -g alternate-screen off

# Setup load change of .tmux.conf
bind R source-file ~/.tmux.conf \; display-message "source-file ~/.tmux.conf"

# Remap clock mode from t to T
bind T clock-mode

# Command below generates default TMUX configuration
# tmux -f /dev/null -L temp start-server \; list-keys > ~/.tmux.reset.conf

# Toggle mouse mode
bind M set mouse \; display-message "Mouse mode: #{?mouse,ON,OFF}"

# Toggle pane input synchronization
bind C-s setw synchronize-panes #\; display-message "Sync panes: #{?synchronize-panes,ON,OFF}"

# Toggle activity monitoring
# -- [Alt] + [n/p]: move to next/prev window  with a bell or activity marker
bind N set monitor-activity \; display-message "set monitor-activity"

# Shell shortcut need to be remapped by prefix+...
# -- Prefix
#    -- [Ctrl] + [a/b]
# -- In vim-tmux-navigator
#    -- [Ctrl] + [h/j/k/l]: Move in pane
bind -r C-b send-keys 'C-b'
bind -r C-h send-keys 'C-h'
bind -r C-j send-keys 'C-j'
bind C-k send-keys 'C-k'
bind C-a send-keys 'C-a'

# Clear current pane output but keep scrollback history
bind a send-keys 'C-l'
bind C-l send-keys 'C-l'
# Clear current pane output and scrollback history
bind C-S-l confirm-before -p "clear scrollback history? (y/n)" "clear-history \; display-message 'scrollback history cleared'"

# Let Home/End work in TMUX
bind -n Home send Escape "OH"
bind -n End send Escape "OF"

# Customization mode (added in tmux 3.2a, defaults: <prefix> + [C])
bind M-C customize-mode -Z

# List all environment variables
bind E show-environment -g

# ============================================================================
# TMUX statusline / titlebar
# ============================================================================
# NOTE: Better color contrast setup for black/brightblack in 16-color, 256-color
# -- In 16-color, black: colour\0, brightblack: colour\8
# -- In 256-color, black: colour\232, brightblack: colour\242

# Toggle TMUX statusline/borderline
bind b set pane-border-status
bind B set status
bind C-g set status

# Toggle TMUX statusline position top/bottom
bind M-b set status-position top
bind M-B set status-position bottom

# Statusline (Powerline support all-in-one)
# -- Installation: dnf install powerline tmux-powerline
#source ~/Desktop/Vim_Tmux_Config/tmux/powerline.conf

# General statusline setting
set -g status on
set -g status-interval 2
set -g status-keys vi
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-bg default
#set -g status-style '#{?client_prefix,fg=colour232,#{?pane_in_mode,fg=colour3,#{?synchronize-panes,fg=colour1,fg=colour2}}}'
set -g status-style fg=colour242

# Copy mode (includes: buffer, search, etc)
set -g mode-style bg=colour3,fg=colour232,bold
setw -g copy-mode-current-match-style bg=colour15,fg=colour232,bold
setw -g copy-mode-match-style bg=colour3,fg=colour232
#setw -g clock-mode-color color3

# Message line (notification/renaming)
set -g message-style bg=colour3,fg=colour232,bold

# Command line (when you type for command :, and search /)
set -g message-command-style bg=colour3,fg=colour232,bold

# Left statusline
set -g status-left-length 40
set -g status-left-style default
# Left statusline w/ tmux conf
set -g status-left ''
set -ag status-left '#{?client_prefix,#[fg=colour232],#{?pane_in_mode,#[fg=colour232],#{?synchronize-panes,#[fg=colour15],#[fg=colour232]}}}'
set -ag status-left '#{?client_prefix,#[bg=colour7],#{?pane_in_mode,#[bg=colour3],#{?synchronize-panes,#[bg=colour1],#[bg=colour2]}}}'
set -ag status-left '#[bold]'
set -ag status-left ' #S '
set -ag status-left '#[default]'
set -ag status-left '#{?client_prefix,#[fg=colour7],#{?pane_in_mode,#[fg=colour3],#{?synchronize-panes,#[fg=colour1],#[fg=colour2]}}}'
set -ag status-left '#{?client_prefix,#[bg=default],#{?pane_in_mode,#[bg=default],#{?synchronize-panes,#[bg=default],#[bg=default]}}}'
set -ag status-left '#[bold]'
set -ag status-left ' #H '
# Left statusline script (overwrites previous statusline settings if the script exists)
if-shell '[ -x #{TMUX_STATUS_LEFT} ]' \
    'set -g status-left "#($TMUX_STATUS_LEFT \
        \"#{client_width}\" \
        \"#{session_windows}\" \
        \"#{client_prefix}\" \
        \"#{pane_in_mode}\" \
        \"#{synchronize-panes}\" \
        \"#S\" \
        \"#H\" \
        \"12\")"'

# Central window statusline
#setw -g window-status-separator '│'
setw -g window-status-separator ' '
setw -g window-status-style fg=colour242
setw -g window-status-format '#{?monitor-activity,#[underscore],}#I:#W#{?window_flags,#{window_flags},}'
setw -g window-status-last-style fg=colour242
setw -g window-status-current-style fg=colour2,bold
setw -g window-status-current-format '#{?pane_in_mode,#[fg=colour3],#{?synchronize-panes,#[fg=colour1],#[fg=colour2]}}'
setw -ag window-status-current-format '#{?client_prefix,#[bg=default],#{?pane_in_mode,#[bg=default],#{?synchronize-panes,#[bg=default],#[bg=default]}}}'
setw -ag window-status-current-format '#{?monitor-activity,#[underscore],}#I:#W#{?window_flags,#{window_flags},}'

# Right statusline
set -g status-right-length 40
set -g status-right-style default
# Right statusline w/ tmux conf
set -g status-right ''
set -ag status-right '#{?client_prefix,#[fg=colour7],#{?pane_in_mode,#[fg=colour3],#{?synchronize-panes,#[fg=colour1],#[fg=colour2]}}}'
set -ag status-right '#{?client_prefix,#[bg=default],#{?pane_in_mode,#[bg=default],#{?synchronize-panes,#[bg=default],#[bg=default]}}}'
set -ag status-right '#[bold]'
set -ag status-right '#(printf "%%s" "#H" | awk "{l=length; if(l<=5) print \" %H:%M \"; else if(l<=8) print \" %d %H:%M \"; else if(l<=11) print \" %m-%d %H:%M \"; else if(l<=14) print \" %y-%m-%d %H:%M \"; else print \" %Y-%m-%d %H:%M \"}")'
set -ag status-right '#{?client_prefix,#[fg=colour232],#{?pane_in_mode,#[fg=colour232],#{?synchronize-panes,#[fg=colour15],#[fg=colour232]}}}'
set -ag status-right '#{?client_prefix,#[bg=colour7],#{?pane_in_mode,#[bg=colour3],#{?synchronize-panes,#[bg=colour1],#[bg=colour2]}}}'
set -ag status-right '#[bold]'
set -ag status-right ' #S '
# Right statusline script (overwrites previous statusline settings if the script exists)
if-shell '[ -x #{TMUX_STATUS_RIGHT} ]' \
    'set -g status-right "#($TMUX_STATUS_RIGHT \
        \"#{client_width}\" \
        \"#{session_windows}\" \
        \"#{client_prefix}\" \
        \"#{pane_in_mode}\" \
        \"#{synchronize-panes}\" \
        \"#S\" \
        \"#H\" \
        \"12\")"'

# Pane boarder statusline (TMUX version >= 2.3 required)
# NOTE:
# -- TMUX does not detect neovim CWD change, which is solved in neovim 0.10
#    -- https://github.com/neovim/neovim/issues/21771
# -- For client_prefix option in pane-border, pane-border-status must be turned ON to render pane-border
set -g pane-border-status top # options: top/bottom/off
set -g pane-border-style '#{?synchronize-panes,fg=colour1,fg=colour242}'
set -ag pane-border-style '#{?synchronize-panes,bold,none}'
set -g pane-active-border-style '#{?client_prefix,fg=colour7,#{?pane_in_mode,fg=colour3,#{?synchronize-panes,fg=colour1,fg=colour2}}}'
set -ag pane-active-border-style '#{?client_prefix,bold,#{?pane_in_mode,bold,#{?synchronize-panes,bold,none}}}'
set -g pane-border-lines single # options: single/double/heavy/simple/number
set -gq pane-border-indicators colour # options: off/colour/arrows/both

# Pane-border: left
set -g pane-border-format '#[align=left]'
set -ag pane-border-format '#{?#{e|>=:#{pane_width},80},#{?pane_active,[#{window_index}:#{pane_index}], #{window_index}:#{pane_index} },}'
set -ag pane-border-format '#{?#{e|>=:#{pane_width},80},#{?window_zoomed_flag,-[ZOOMED],},}'
set -ag pane-border-format '#{?#{e|>=:#{pane_width},80},#{?pane_marked,-[MARKED],},}'
# Pane-border: center
set -ag pane-border-format '#[align=absolute-centre]'
if-shell '[ -x "#{TMUX_SHORT_PATH}" ]' \
    'set -ag pane-border-format "#{?#{e|>=:#{pane_width},80},#{?pane_active,[#{s|$HOME|~|:pane_current_path}], #(#{TMUX_SHORT_PATH} \"#{pane_current_path}\") },#{?pane_active,[#{window_index}:#{pane_index}], #{window_index}:#{pane_index} }}"' \
    'set -ag pane-border-format "#{?#{e|>=:#{pane_width},80},#{?pane_active,[#{s|$HOME|~|:pane_current_path}],[#{b:pane_current_path}]},#{?pane_active,[#{window_index}:#{pane_index}], #{window_index}:#{pane_index} }}"'
# Pane-border: right
set -ag pane-border-format '#[align=right]'
set -ag pane-border-format '#{?#{e|>=:#{pane_width},80},#{?pane_active,[#{pane_current_command}], #{pane_current_command} },}'

# Terminal emulator window title
set -g set-titles on
set -g set-titles-string '[T] #H|#S|#I:#W [T]'

# ============================================================================
# TMUX plugins (Add following lines after set -g @plugin 'tmux-plugins/tpm')
# ============================================================================

# Bootstrap TPM and install plugins automatically if TPM not present
if "test ! -d ~/.tmux/plugins/tpm" \
  "run-shell 'tmux display-message \"📦 Downloading tmux plugins...\"; \
              git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
              ~/.tmux/plugins/tpm/bin/install_plugins && \
              tmux display-message \"✅ Plugins installed.\"'"

# TMUX plugin manager (Must be the first line)
# TPM (TMUX plugin manager, TMUX version >= 1.9 required)
# (1) Install plugin
#     -- In TMUX, <prefix> + [Shift] + [i]
# (2) Upgrade plugin
#     -- In TMUX, <prefix> + [Shift] + [u]
# (3) Uninstall plugin
#     -- In TMUX, <prefix> + [Alt] + [u]
set -g @plugin 'tmux-plugins/tpm'

## TMUX pop
#set -g @plugin 'roosta/tmux-pop'
#set -g @tmux-pop-color 'colour232'

# TMUX sidebar (file-tree)
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @sidebar-tree-command 'tree -C -L 4'
set -g @sidebar-tree-focus 'Tab'
set -g @sidebar-tree 'BTab'
set -g @sidebar-tree-position 'left'
set -g @sidebar-tree-width '40'

# TMUX resurrect previous session
# Caution: This will resurrect ALL saved session (stored in ~/.tmux/resurrect/last)
# -- https://github.com/tmux-plugins/tmux-resurrect/blob/master/docs/restoring_programs.md
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes ':all:'

# TMUX continuum (supported by resurrect)
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TMUX-VIM shared pane navigator
# -- [Ctrl] + [vim-key]: Select pane
set -g @plugin 'christoomey/vim-tmux-navigator'

## TMUX statusline auto-hiding
#set -g @plugin 'TheSast/tmux-transient-status'
#set -g @transient-status-delay '0.05'
#set -g @transient-status-stall '0.45'   # enable statusline auto-hiding
##set -g @transient-status-stall '99999' # disable statusline auto-hiding

## TMUX copycat (better regex search support, already built in TMUX 3.x)
## -- <prefix> + [TMUX_COPYCAT_COMMAND]: Search pattern in copy-mode
#set -g @plugin 'tmux-plugins/tmux-copycat'
#set -g @copycat_digit_search 'M-d' # d for [d]igit
#set -g @copycat_file_search 'M-f'  # f for [f]ile
#set -g @copycat_git_special 'M-g'  # g for [g]it (files for git status)
#set -g @copycat_hash_search 'M-v'  # v for [v]alue (hash value for git log)
#set -g @copycat_ip_search 'M-i'    # i for [i]p
#set -g @copycat_url_search 'M-w'   # w for [w]ebsite

# TMUX fingers
# -- Enter finger mode: <prefix> + [f]
# -- In finger mode,
#    -- [Ctrl] + [mark]: Open selection
#    -- [Shift] + [mark]: Paste after selection
#    -- [Tab]: Toggle multi-selection mode. Press it again to end selection
# NOTE:
# -- You need to install binary at first startup (installer-wizard should pop up automatically)
#    -- https://github.com/Morantron/tmux-fingers#fingers-enabled-builtin-patterns
# -- Finger mode use non-login shell to create visual marks.
#    Make sure you don't have any prompt in non-login shells to pevernt offsets

set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-key 'f'
set -g @fingers-jump-key 'e'
set -g @fingers-show-copied-notification '1'
set -g @fingers-hint-position 'left'
# Add pattern for
# - All Chinese characters
# - English word contains more than 3 characters
# - Number which length is more than 3 digits
set -g @fingers-pattern-0 '(\p{Han}{1,}|(?=\S*[\p{L}\p{N}])\S{4,})'

## TMUX-SYSTEM shared clipboard (clipboard sync already built in TMUX 3.2)
## You might need package like xsel or xclip for clipboard synchronization
## -- <prefix> + [y]: Copy current line
## -- <prefix> + [Y]: Copy current PWD
#set -g @plugin 'tmux-plugins/tmux-yank'
#set -g @yank_selection 'primary' # 'primary' or 'secondary' or 'clipboard'

# TMUX open file/url with default editor/browser
# --- <prefix> + [o]: In copy mode, open selected text with editor
# --- <prefix> + [O]: In copy mode, open selected text with xdg-open
set -g @plugin 'tmux-plugins/tmux-open'
set -g @open-editor 'o'
set -g @open 'O'

# TMUX logging and screen capture
# -- <prefix> + [Alt] + [p]: PrtSc current pane
# -- <prefix> + [Alt] + [P]: PrtSc all panes of the current session
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @logging_key 'M-L'
set -g @screen-capture-key 'M-S'
set -g @save-complete-history-key 'M-H'
set -g @clean-history-key ''

# TMUX session manager
# -- <prefix> + [t] + <secondary>: join-pane
# -- Available <secondary>:
#    -- [h/-/"]: join horizontally
#    -- [v/|/%]: join vertically
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @sessionist-goto "M-\q"
set -g @sessionist-alternate 'M-`'
set -g @sessionist-join-pane 't'
set -g @sessionist-new 'M-c'
set -g @sessionist-promote-pane '@'
set -g @sessionist-kill-session 'M-x'

## TMUX use fzf to manage session/window
#set -g @plugin 'sainnhe/tmux-fzf'
#TMUX_FZF_LAUNCH_KEY="BTab"
#TMUX_FZF_OPTIONS="-p -w 75% -h 75% -m"
#bind-key "Tab" run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"

# TMUX suspender for nested tmux sessions
# -- Toggle suspension via [Alt]+[s] (defaults: [F12])
# -- Issue: This function does not apply to commands start with prefix2
set -g @plugin 'MunifTanjim/tmux-suspend'
set -g @suspend_key 'M-s'
set -g @suspend_on_resume_command "tmux set-option -g status-bg default"
set -g @suspend_on_suspend_command "tmux set-option -g status-bg colour7"

# Initialize TMUX plugin manager (keep this line at the end of plugins)
run '~/.tmux/plugins/tpm/tpm'

# ============================================================================
# Overwrite TMUX plugins bindkey
# ============================================================================
# Disable some non-used plugins bindkeys

## Open choose-tree with all windows in all sessions
#unbind Tab; bind Tab choose-tree -wZ
## Open choose-tree with all panes in all sessions
#bind BTab choose-tree -Z

# Open choose-tree with all sessions sorted by name
unbind s; bind s choose-tree -sZ -O name

# ============================================================================
# Miscellaneous bindkey
# ============================================================================

# Print (whoami)@(hostname):(pwd) into the current pane
bind P run-shell "tmux send-keys \"$(whoami)@$(hostname):$(pwd)\""

# Github worktree script (requires git, fzf)
# -- Source: https://github.com/micahkepe/dotfiles/blob/main/tmux/tmux-worktreeizer.sh
# -- Installation: ln -s $PWD/tmux-worktreeizer.sh ~/.local/bin/tmux-worktreeizer.sh
bind W run-shell "tmux neww tmux-worktreeizer.sh"
